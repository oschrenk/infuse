version: '3'
vars:
  APP_NAME: "infuse"
  RELEASE_DIR: "./.release"
  BUILD_TARGET: "./{{.APP_NAME}}"
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo unknown
  BUILD_DATE:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  LDFLAGS: >-
    -X github.com/oschrenk/infuse/internal/cli.Version={{.VERSION}} -X github.com/oschrenk/infuse/internal/cli.Commit={{.COMMIT}} -X github.com/oschrenk/infuse/internal/cli.BuildDate={{.BUILD_DATE}}
tasks:
  run:
    cmds:
      - go run -ldflags '{{.LDFLAGS}}' ./cmd/infuse
    silent: true
  check:
    cmds:
      - staticcheck ./...
  vet:
    cmds:
      - go vet ./...
  tidy:
    deps: [vet]
    cmds:
      - go mod tidy
  lint:
    deps: [check, tidy]
  build:
    requires:
      vars: [BUILD_TARGET]
    cmds:
      - go build -v -ldflags '{{.LDFLAGS}}' -o "{{.BUILD_TARGET}}" ./cmd/infuse
    silent: true
  test:
    cmds:
      - go test ./...
    silent: true
  install:
    desc: Install to $GOPATH/bin/ and fish completion
    cmds:
      - go install -ldflags '{{.LDFLAGS}}' ./cmd/infuse
      - mkdir -p ~/.config/fish/completions
      - go run -ldflags '{{.LDFLAGS}}' ./cmd/infuse completion fish > ~/.config/fish/completions/{{.APP_NAME}}.fish
    silent: true
  uninstall:
    desc: Remove from $GOPATH/bin/ and fish completion
    cmds:
      - rm -f $(go env GOPATH)/bin/{{.APP_NAME}}
      - rm -f ~/.config/fish/completions/{{.APP_NAME}}.fish
    silent: true
  artifacts:
    desc: Build release artifacts to .release/
    requires:
      vars: [APP_NAME, RELEASE_DIR]
    cmds:
      - mkdir -p {{.RELEASE_DIR}}
      - GOOS=darwin GOARCH=arm64 go build -v -ldflags '{{.LDFLAGS}}' -o {{.RELEASE_DIR}}/{{.APP_NAME}}-darwin-arm64 ./cmd/infuse
    deps: [tidy]
  version:
    desc: Show current version info from git
    cmds:
      - echo "Version {{.VERSION}} ({{.COMMIT}}, {{.BUILD_DATE}})"
    silent: true
  tag:
    desc: "Create and push git tag (usage: task tag TAG=v0.1.0)"
    requires:
      vars: [TAG]
    cmds:
      - git tag "{{.TAG}}"
      - git push origin "{{.TAG}}"
  release:
    desc: "Create GitHub release with artifacts (usage: task release TAG=v0.1.0)"
    requires:
      vars: [APP_NAME, RELEASE_DIR, TAG]
    deps: [artifacts]
    cmds:
      - gh release create --generate-notes "{{.TAG}}" {{.RELEASE_DIR}}/{{.APP_NAME}}-*
  sha:
    desc: Generate SHA256 checksums
    requires:
      vars: [APP_NAME, RELEASE_DIR]
    cmds:
      - shasum -a 256 {{.RELEASE_DIR}}/{{.APP_NAME}}-*
  clean:
    requires:
      vars: [BUILD_TARGET, RELEASE_DIR]
    cmds:
      - rm -rf {{.BUILD_TARGET}}
      - rm -rf {{.RELEASE_DIR}}
  updates:
    desc: Check for dependency updates
    cmds:
      - "go list -u -f '{{`{{if (and (not (or .Main .Indirect)) .Update)}}{{.Path}}: {{.Version}} -> {{.Update.Version}}{{end}}`}}' -m all 2> /dev/null"
